<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>#box{width:1024px;height:758px;margin:0;padding:0}</style>
</head>
<body>
<div id="box">
  <!-- 填你自己的独立worker代理链接 -->
  <iframe src="https://canva-proxy-img.672167978.workers.dev" width="1024" height="758" frameborder="0"></iframe>
</div>
<script>
window.onload = async ()=>{
  // 等待5秒，给动态日历加载时间
  await new Promise(r=>setTimeout(r,5000));
  const canvas = await html2canvas(document.getElementById("box"),{
    useCORS:true,scale:1,width:1024,height:758
  });
  document.body.innerHTML="";
  const img = new Image();
  img.src = canvas.toDataURL("image/png");
  document.body.appendChild(img);
}
</script>
</body>
</html>
